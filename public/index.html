<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="description" content="Option Intel — Institutional-grade options screening and strategy intelligence. Find high-probability options strategies with clear, novice-friendly explainers.">
  <meta name="theme-color" content="#0A0A0F">
  <title>Option Intel</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600;700&display=swap" rel="stylesheet">

  <!-- TradingView Lightweight Charts -->
  <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

  <!-- Stylesheets -->
  <link rel="stylesheet" href="/css/variables.css">
  <link rel="stylesheet" href="/css/base.css">
  <link rel="stylesheet" href="/css/components.css">
  <link rel="stylesheet" href="/css/animations.css">
</head>
<body>

  <!-- Top Bar -->
  <header class="top-bar" id="top-bar">
    <div class="top-bar__logo">
      <div class="top-bar__logo-icon">OI</div>
      <span>Option Intel</span>
    </div>
    <div class="top-bar__actions">
      <button class="icon-btn" id="search-btn" aria-label="Search stocks">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
      </button>
      <button class="icon-btn" id="theme-toggle" aria-label="Toggle theme">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
      </button>
    </div>
  </header>

  <!-- Search Overlay -->
  <div class="search-overlay" id="search-overlay">
    <div class="search-overlay__container">
      <input type="text" class="search-overlay__input" id="search-input" placeholder="Search stocks... (e.g., AAPL, TSLA)" autocomplete="off">
      <button class="search-overlay__cancel" id="search-cancel">Cancel</button>
    </div>
    <div class="search-overlay__results" id="search-results"></div>
  </div>

  <!-- Main Content -->
  <main id="app"></main>

  <!-- Bottom Navigation -->
  <nav class="bottom-nav" id="bottom-nav">
    <button class="bottom-nav__item active" data-route="/" data-page="market">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 3v18h18"/><path d="m19 9-5 5-4-4-3 3"/></svg>
      Market
    </button>
    <button class="bottom-nav__item" data-route="/screener" data-page="screener">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M12 20V10"/><path d="M18 20V4"/><path d="M6 20v-4"/></svg>
      Screener
    </button>
  </nav>

  <!-- App Script -->
  <script type="module" src="/js/app.js"></script>
</body>
</html>
